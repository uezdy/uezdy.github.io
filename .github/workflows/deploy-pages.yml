name: Deploy GitHub Pages

on:
  push:
    branches:
      - new-approach
  schedule:
    # Every Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_run:
    workflows:
      - Export Telegram messages
    types:
      - completed
    branches:
      - new-approach
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Restore Telegram export cache
        uses: actions/cache/restore@v4
        id: telegram-export-cache
        with:
          path: data/groups
          key: telegram-export-${{ runner.os }}-${{ hashFiles('data/groups.json', 'data/groups/**/export_state.json') }}
          restore-keys: |
            telegram-export-${{ runner.os }}-

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Export Telegram messages
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        run: |
          pip install -r requirements.txt
          python scripts/export_telegram.py

      - name: Save Telegram export cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/groups
          key: telegram-export-${{ runner.os }}-${{ hashFiles('data/groups.json', 'data/groups/**/export_state.json') }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
