name: Deploy GitHub Pages

on:
  push:
    branches:
      - new-approach
  schedule:
    # Every Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_run:
    workflows:
      - Export Telegram messages
    types:
      - completed
    branches:
      - new-approach
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Prepare archive directory
        run: mkdir -p data/groups

      - name: Restore telegram archive from previous run
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: deploy-pages.yml
          name: telegram-archive
          path: data
          workflow_conclusion: success
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Export Telegram messages
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
        run: |
          pip install -r requirements.txt
          python scripts/export_telegram.py

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          NEXT_PUBLIC_GA_MEASUREMENT_ID: G-6QHG8Y9277
        run: npm run build

      - name: Save telegram archive for next run
        uses: actions/upload-artifact@v4
        with:
          name: telegram-archive
          path: |
            data/groups/
            data/sitemap-state.json
          if-no-files-found: warn
          retention-days: 90

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
